<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Number Battle — Latihan interaktif bilangan bulat dengan operasi penjumlahan, pengurangan, dan perkalian.">
  <title>Number Battle — Latihan Bilangan Bulat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ============================================
       CSS RESET
       ============================================ */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ============================================
       DESIGN TOKENS (CSS Variables)
       ============================================ */
    :root {
      /* Colors — Primary Palette */
      --color-bg-primary: #07080f;
      --color-bg-secondary: #0e1120;
      --color-surface: rgba(255, 255, 255, 0.04);
      --color-border: rgba(255, 255, 255, 0.08);
      --color-text-primary: #f1f5f9;
      --color-text-muted: #94a3b8;

      /* Accent Colors */
      --color-accent-indigo: #6366f1;
      --color-accent-violet: #8b5cf6;
      --color-accent-pink: #ec4899;
      --color-accent-cyan: #06b6d4;
      --color-accent-emerald: #10b981;

      /* Functional Colors */
      --color-win: #22c55e;
      --color-lose: #ef4444;
      --color-draw: #f59e0b;

      /* Particle Colors — Harmonic Set */
      --particle-1: #6366f1;
      --particle-2: #8b5cf6;
      --particle-3: #ec4899;
      --particle-4: #06b6d4;
      --particle-5: #10b981;

      /* Spacing */
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --space-2xl: 48px;

      /* Border Radius */
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-full: 9999px;

      /* Typography */
      --font-family: 'Inter', system-ui, -apple-system, sans-serif;
      --font-size-xs: 0.75rem;
      --font-size-sm: 0.875rem;
      --font-size-md: 1rem;
      --font-size-lg: 1.25rem;
      --font-size-xl: 1.5rem;
      --font-size-2xl: 2rem;
      --font-size-3xl: 2.75rem;

      /* Shadows */
      --shadow-glow-indigo: 0 0 20px rgba(99, 102, 241, 0.3);
      --shadow-glow-emerald: 0 0 20px rgba(16, 185, 129, 0.3);
      --shadow-glow-pink: 0 0 20px rgba(236, 72, 153, 0.3);
      --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.4);

      /* Transitions */
      --transition-fast: 150ms ease;
      --transition-normal: 300ms ease;
      --transition-slow: 500ms ease;

      /* Aliases & Missing Variables for History */
      --glass: var(--color-surface);
      --glass-border: var(--color-border);
      --text-muted: var(--color-text-muted);
      --accent-green: var(--color-win);
      --accent-red: var(--color-lose);
      --accent-yellow: var(--color-draw);
    }

    /* ============================================
       BASE STYLES
       ============================================ */
    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: var(--font-family);
      background-color: var(--color-bg-primary);
      color: var(--color-text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    /* ============================================
       PARTICLE SYSTEM — Anti-Gravity Floating
       ============================================ */
    .particles {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes particle-float {
      0% {
        transform: translateY(0);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateY(-110vh);
        opacity: 0;
      }
    }

    .particles__dot {
      position: absolute;
      bottom: -20px;
      border-radius: var(--radius-full);
      pointer-events: none;
      will-change: transform, opacity;
      animation: particle-float linear infinite;
    }

    /* Color rotation via modular nth-child */
    .particles__dot:nth-child(5n+1) { background-color: var(--particle-1); }
    .particles__dot:nth-child(5n+2) { background-color: var(--particle-2); }
    .particles__dot:nth-child(5n+3) { background-color: var(--particle-3); }
    .particles__dot:nth-child(5n+4) { background-color: var(--particle-4); }
    .particles__dot:nth-child(5n+5) { background-color: var(--particle-5); }

    /* Particle variations — position, size, speed, delay */
    .particles__dot:nth-child(1)  { left:  3%; width: 6px;  height: 6px;  animation-duration: 7s;  animation-delay: 0s;   opacity: 0.7; }
    .particles__dot:nth-child(2)  { left:  8%; width: 4px;  height: 4px;  animation-duration: 9s;  animation-delay: 1s;   opacity: 0.5; }
    .particles__dot:nth-child(3)  { left: 14%; width: 8px;  height: 8px;  animation-duration: 11s; animation-delay: 0.5s; opacity: 0.6; }
    .particles__dot:nth-child(4)  { left: 20%; width: 3px;  height: 3px;  animation-duration: 8s;  animation-delay: 3s;   opacity: 0.4; }
    .particles__dot:nth-child(5)  { left: 26%; width: 5px;  height: 5px;  animation-duration: 10s; animation-delay: 2s;   opacity: 0.8; }
    .particles__dot:nth-child(6)  { left: 32%; width: 7px;  height: 7px;  animation-duration: 12s; animation-delay: 4s;   opacity: 0.5; }
    .particles__dot:nth-child(7)  { left: 37%; width: 4px;  height: 4px;  animation-duration: 7.5s;animation-delay: 1.5s; opacity: 0.6; }
    .particles__dot:nth-child(8)  { left: 43%; width: 6px;  height: 6px;  animation-duration: 9.5s;animation-delay: 0.8s; opacity: 0.7; }
    .particles__dot:nth-child(9)  { left: 50%; width: 3px;  height: 3px;  animation-duration: 11s; animation-delay: 3.5s; opacity: 0.4; }
    .particles__dot:nth-child(10) { left: 55%; width: 8px;  height: 8px;  animation-duration: 8.5s;animation-delay: 2.5s; opacity: 0.6; }
    .particles__dot:nth-child(11) { left: 60%; width: 5px;  height: 5px;  animation-duration: 10s; animation-delay: 1.2s; opacity: 0.5; }
    .particles__dot:nth-child(12) { left: 65%; width: 4px;  height: 4px;  animation-duration: 13s; animation-delay: 4.5s; opacity: 0.7; }
    .particles__dot:nth-child(13) { left: 70%; width: 7px;  height: 7px;  animation-duration: 7.8s;animation-delay: 0.3s; opacity: 0.5; }
    .particles__dot:nth-child(14) { left: 75%; width: 3px;  height: 3px;  animation-duration: 9s;  animation-delay: 2.8s; opacity: 0.6; }
    .particles__dot:nth-child(15) { left: 80%; width: 6px;  height: 6px;  animation-duration: 11.5s;animation-delay: 1.8s; opacity: 0.4; }
    .particles__dot:nth-child(16) { left: 85%; width: 5px;  height: 5px;  animation-duration: 8s;  animation-delay: 3.2s; opacity: 0.8; }
    .particles__dot:nth-child(17) { left: 89%; width: 4px;  height: 4px;  animation-duration: 10.5s;animation-delay: 0.7s; opacity: 0.5; }
    .particles__dot:nth-child(18) { left: 93%; width: 7px;  height: 7px;  animation-duration: 12s; animation-delay: 2.2s; opacity: 0.6; }
    .particles__dot:nth-child(19) { left: 96%; width: 3px;  height: 3px;  animation-duration: 9.2s;animation-delay: 4s;   opacity: 0.7; }
    .particles__dot:nth-child(20) { left: 48%; width: 5px;  height: 5px;  animation-duration: 8.8s;animation-delay: 1.4s; opacity: 0.5; }

    /* ============================================
       GAME LAYOUT
       ============================================ */
    .game {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
      padding: var(--space-lg);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-xl);
    }

    /* --- Header --- */
    .game__header {
      text-align: center;
    }

    .game__title {
      font-size: var(--font-size-2xl);
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--color-accent-indigo), var(--color-accent-violet), var(--color-accent-pink));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: var(--space-xs);
    }

    .game__subtitle {
      font-size: var(--font-size-sm);
      color: var(--color-text-muted);
      font-weight: 400;
      margin-bottom: var(--space-sm);
    }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: var(--radius-full);
      background: rgba(99, 102, 241, 0.1);
      border: 1px solid rgba(99, 102, 241, 0.2);
      color: var(--color-accent-indigo);
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* --- Score Bar --- */
    .score-bar {
      display: flex;
      justify-content: center;
      gap: var(--space-2xl);
    }

    .score-bar__item {
      text-align: center;
    }

    .score-bar__label {
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: var(--space-xs);
    }

    .score-bar__value {
      font-size: var(--font-size-xl);
      font-weight: 700;
      color: var(--color-accent-cyan);
    }

    /* --- Arena (Cards Grid) --- */
    .arena {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: var(--space-lg);
      align-items: center;
      width: 100%;
    }

    /* --- Card (Glassmorphism) --- */
    .card {
      background: var(--color-surface);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-xl) var(--space-lg);
      text-align: center;
      box-shadow: var(--shadow-card);
      transition: transform var(--transition-normal), box-shadow var(--transition-normal);
    }

    .card:hover {
      transform: translateY(-4px);
    }

    .card--player {
      border-color: rgba(99, 102, 241, 0.25);
    }

    .card--player:hover {
      box-shadow: var(--shadow-glow-indigo);
    }

    .card--enemy {
      border-color: rgba(236, 72, 153, 0.25);
    }

    .card--enemy:hover {
      box-shadow: var(--shadow-glow-pink);
    }

    .card__label {
      font-size: var(--font-size-sm);
      color: var(--color-text-muted);
      margin-bottom: var(--space-sm);
      font-weight: 600;
    }

    .card__number {
      font-size: var(--font-size-3xl);
      font-weight: 800;
      line-height: 1;
      min-height: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color var(--transition-fast);
    }

    .card--player .card__number {
      color: var(--color-accent-indigo);
    }

    .card--enemy .card__number {
      color: var(--color-accent-pink);
    }

    /* History panel */
      .history-section {
          margin-top: 24px;
          background: var(--glass);
          border: 1px solid var(--glass-border);
          border-radius: 16px;
          padding: 18px 20px;
          backdrop-filter: blur(12px);
      }

      .history-section .section-label {
          font-size: 0.75rem;
          text-transform: uppercase;
          letter-spacing: 2px;
          color: var(--text-muted);
          margin-bottom: 12px;
      }

      .history-list {
          display: flex;
          flex-direction: column;
          gap: 6px;
          max-height: 200px;
          overflow-y: auto;
      }

      .history-list::-webkit-scrollbar {
          width: 4px;
      }

      .history-list::-webkit-scrollbar-track {
          background: transparent;
      }

      .history-list::-webkit-scrollbar-thumb {
          background: var(--glass-border);
          border-radius: 4px;
      }

      .history-item {
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 8px 14px;
          border-radius: 10px;
          background: rgba(255, 255, 255, 0.02);
          font-size: 0.85rem;
          animation: slideIn 0.3s ease-out;
      }

      @keyframes slideIn {
          from {
              opacity: 0;
              transform: translateX(-10px);
          }

          to {
              opacity: 1;
              transform: translateX(0);
          }
      }

      .history-item .eq {
          font-family: 'JetBrains Mono', monospace;
          color: var(--text-muted);
          font-size: 0.8rem;
      }

      .history-item .result-badge {
          padding: 2px 10px;
          border-radius: 6px;
          font-size: 0.7rem;
          font-weight: 700;
          text-transform: uppercase;
          letter-spacing: 1px;
      }

      .history-item .result-badge.win {
          background: rgba(34, 197, 94, 0.15);
          color: var(--accent-green);
      }

      .history-item .result-badge.lose {
          background: rgba(239, 68, 68, 0.15);
          color: var(--accent-red);
      }

      .history-item .result-badge.draw {
          background: rgba(250, 204, 21, 0.15);
          color: var(--accent-yellow);
      }

      .empty-history {
          text-align: center;
          color: var(--text-muted);
          font-size: 0.85rem;
          padding: 20px 0;
          opacity: 0.6;
      }
    /* --- VS Badge --- */
    .arena__vs {
      font-size: var(--font-size-lg);
      font-weight: 800;
      color: var(--color-text-muted);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-full);
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* --- Result Banner --- */
    .result {
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .result__text {
      font-size: var(--font-size-lg);
      font-weight: 700;
      padding: var(--space-sm) var(--space-lg);
      border-radius: var(--radius-full);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      opacity: 0;
      transform: scale(0.8);
      transition: opacity var(--transition-normal), transform var(--transition-normal);
    }

    .result__text.is-visible {
      opacity: 1;
      transform: scale(1);
    }

    .result__text--win  { color: var(--color-win);  border-color: rgba(34, 197, 94, 0.3);  }
    .result__text--lose { color: var(--color-lose); border-color: rgba(239, 68, 68, 0.3);  }
    .result__text--draw { color: var(--color-draw); border-color: rgba(245, 158, 11, 0.3); }

    /* --- Operation Buttons --- */
    .ops {
      text-align: center;
    }

    .ops__title {
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: var(--space-md);
    }

    .ops__grid {
      display: flex;
      gap: var(--space-md);
      justify-content: center;
    }

    .ops__btn {
      width: 60px;
      height: 60px;
      border-radius: var(--radius-md);
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: var(--color-text-primary);
      font-size: var(--font-size-xl);
      font-weight: 700;
      font-family: var(--font-family);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform var(--transition-normal),
                  box-shadow var(--transition-normal),
                  background var(--transition-normal);
    }

    .ops__btn:hover {
      transform: scale(1.1);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: var(--shadow-glow-indigo);
    }

    .ops__btn:active {
      transform: scale(0.95);
    }

    .ops__btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* --- Deal Button --- */
    .btn-deal {
      padding: var(--space-md) var(--space-xl);
      border-radius: var(--radius-full);
      border: none;
      background: linear-gradient(135deg, var(--color-accent-indigo), var(--color-accent-violet));
      color: #fff;
      font-size: var(--font-size-md);
      font-weight: 700;
      font-family: var(--font-family);
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: transform var(--transition-normal),
                  box-shadow var(--transition-normal);
    }

    .btn-deal:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(99, 102, 241, 0.4);
    }

    .btn-deal:active {
      transform: translateY(0);
    }

    /* --- HR Divider --- */
    hr {
      border: none;
      height: 1px;
      width: 100%;
      background: linear-gradient(to right, transparent, var(--color-border), transparent);
      margin: var(--space-sm) 0;
    }

    /* --- Footer (Watermark) --- */
    .game__footer {
      width: 100%;
      margin-top: var(--space-xl);
      padding-top: var(--space-md);
      border-top: 1px solid var(--color-border);
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
      text-align: center;
      letter-spacing: 0.05em;
      opacity: 0.6;
    }

    .game__footer p {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .game__footer p::before,
    .game__footer p::after {
      content: "";
      height: 1px;
      flex: 1;
      background: linear-gradient(to right, transparent, var(--color-border), transparent);
    }

    /* ============================================
       ANIMATIONS — Card Flip
       ============================================ */
    @keyframes card-pop {
      0%   { transform: scale(0.9); opacity: 0.5; }
      50%  { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }

    .card.is-dealing .card__number {
      animation: card-pop var(--transition-slow) ease-out;
    }

    /* ============================================
       RESPONSIVE
       ============================================ */
    @media (max-width: 520px) {
      .game__title {
        font-size: var(--font-size-xl);
      }

      .arena {
        grid-template-columns: 1fr;
        gap: var(--space-md);
      }

      .arena__vs {
        width: 40px;
        height: 40px;
        font-size: var(--font-size-md);
        margin: 0 auto;
      }

      .card {
        padding: var(--space-lg) var(--space-md);
      }

      .card__number {
        font-size: var(--font-size-2xl);
      }

      .ops__btn {
        width: 52px;
        height: 52px;
      }
    }

    
  </style>
</head>
<body>

  <!-- ========== PARTICLE BACKGROUND ========== -->
  <div class="particles" aria-hidden="true">
    <div class="particles__dot"></div>
    <div class="particles__dot"></div>
    <div class="particles__dot"></div>
    <div class="particles__dot"></div>
    <div class="particles__dot"></div>
    <div class="particles__dot"></div>
    <div class="particles__dot"></div>
    <div class="particles__dot"></div>
    <div class="particles__dot"></div>
    <div class="particles__dot"></div>
    <div class="particles__dot"></div>
    <div class="particles__dot"></div>
    <div class="particles__dot"></div>
    <div class="particles__dot"></div>
    <div class="particles__dot"></div>
    <div class="particles__dot"></div>
    <div class="particles__dot"></div>
    <div class="particles__dot"></div>
    <div class="particles__dot"></div>
    <div class="particles__dot"></div>
  </div>

  <!-- ========== GAME UI ========== -->
  <main class="game">

    <!-- Header -->
    <header class="game__header">
      <h1 class="game__title">⚔️ Number Battle</h1>
      <p class="game__subtitle">Latihan Bilangan Bulat</p>
      <span class="badge">Tema: Bilangan Bulat</span>
    </header>

    <!-- Score Bar -->
    <section class="score-bar" aria-label="Skor permainan">
      <div class="score-bar__item">
        <div class="score-bar__label">Ronde</div>
        <div class="score-bar__value" id="roundCount">0</div>
      </div>
      <div class="score-bar__item">
        <div class="score-bar__label">Menang</div>
        <div class="score-bar__value" id="winCount" style="color: var(--color-win);">0</div>
      </div>
      <div class="score-bar__item">
        <div class="score-bar__label">Kalah</div>
        <div class="score-bar__value" id="loseCount" style="color: var(--color-lose);">0</div>
      </div>
      <div class="score-bar__item">
        <div class="score-bar__label">Seri</div>
        <div class="score-bar__value" id="drawCount" style="color: var(--color-draw);">0</div>
      </div>
    </section>

    <!-- Arena -->
    <section class="arena" id="arena" aria-label="Arena pertarungan">
      <article class="card card--player" id="playerCard">
        <div class="card__label">🧑 Pemain</div>
        <div class="card__number" id="playerNumber">?</div>
      </article>

      <div class="arena__vs" aria-hidden="true">VS</div>

      <article class="card card--enemy" id="enemyCard">
        <div class="card__label">👾 Lawan</div>
        <div class="card__number" id="enemyNumber">?</div>
      </article>
    </section>

    <!-- Result Banner -->
    <div class="result" aria-live="polite">
      <div class="result__text" id="resultText"></div>
    </div>

    <!-- Operation Buttons -->
    <section class="ops" aria-label="Pilih operasi">
      <div class="ops__title">Pilih Operasi</div>
      <div class="ops__grid" id="opsGrid">
        <button class="ops__btn" data-op="add" id="opAdd" disabled aria-label="Tambah">+</button>
        <button class="ops__btn" data-op="sub" id="opSub" disabled aria-label="Kurang">−</button>
        <button class="ops__btn" data-op="mul" id="opMul" disabled aria-label="Kali">×</button>
      </div>
    </section>

    <!-- Deal Button -->
    <button class="btn-deal" id="btnDeal">🎴 Bagikan Kartu</button>

    <hr>

    <div class="history-section">
      <div class="section-label">📜 Riwayat Pertandingan</div>
      <div class="history-list" id="historyList">
        <div class="empty-history">Belum Ada pertandingan. Tekan "Bagikan Kartu" untuk mulai. </div>
      </div>
    </div>
      
    

    <!-- Footer -->
    <footer class="game__footer">
      <p>Ujian Praktek Matematika &copy; Jmarco 2026</p>
    </footer>

  </main>

  <script>
    // ========== DOM REFERENCES ==========
    const $ = (id) => document.getElementById(id);

    const playerNum   = $('playerNumber');
    const enemyNum    = $('enemyNumber');
    const playerCard  = $('playerCard');
    const enemyCard   = $('enemyCard');
    const btnDeal     = $('btnDeal');
    const resultText  = $('resultText');
    const roundCount  = $('roundCount');
    const winCount    = $('winCount');
    const loseCount   = $('loseCount');
    const drawCount   = $('drawCount');
    const historyList = $('historyList');
    const opsBtns     = document.querySelectorAll('.ops__btn');

    // ========== GAME STATE ==========
    let playerCardValue = 0;
    let enemyCardValue  = 0;
    let rounds = 0;
    let wins   = 0;
    let loses  = 0;
    let draws  = 0;

    // ========== HELPERS ==========

    // Angka acak dari -10 s/d 10
    const generateCard = () => Math.floor(Math.random() * 21) - 10;

    // Toggle semua tombol operasi
    const setOpsEnabled = (enabled) =>
      opsBtns.forEach((btn) => (btn.disabled = !enabled));

    // Animasi pop pada kartu
    const animateCard = (card) => {
      card.classList.remove('is-dealing');
      void card.offsetWidth;            // reflow
      card.classList.add('is-dealing');
    };

    // Tampilkan result banner
    const showResult = (message, type) => {
      resultText.textContent = message;
      resultText.className   = 'result__text is-visible '
        + (type === 'win'  ? 'result__text--win'
         : type === 'lose' ? 'result__text--lose'
         :                    'result__text--draw');
    };

    // Tambah Riwayat
    const addHistory = (pVal, eVal, op, res, type) => {
      // Hapus tulisan "Belum ada" jika ini pertandingan pertama
      if (rounds === 1 && historyList.querySelector('.empty-history')) {
        historyList.innerHTML = '';
      }

      const item = document.createElement('div');
      item.className = 'history-item';
      item.innerHTML = `
        <span class="eq">${pVal} ${op} ${eVal} = ${res}</span>
        <span class="result-badge ${type}">${type}</span>
      `;
      historyList.prepend(item);
    };

    // ========== DEAL — Bagikan Kartu ==========
    btnDeal.addEventListener('click', () => {
      playerCardValue = generateCard();
      enemyCardValue  = generateCard();

      playerNum.textContent = playerCardValue;
      enemyNum.textContent  = enemyCardValue;

      animateCard(playerCard);
      animateCard(enemyCard);

      rounds++;
      roundCount.textContent = rounds;

      resultText.classList.remove('is-visible');
      setOpsEnabled(true);
    });

    // ========== HITUNG & CEK PEMENANG ==========
    const hitungHasil = (op) => {
      const symbols = { add: '+', sub: '-', mul: '×' };
      const symbol = symbols[op] || op;
      
      const hasil = op === 'add' || op === '+' ? playerCardValue + enemyCardValue
                  : op === 'sub' || op === '-' ? playerCardValue - enemyCardValue
                  :                              playerCardValue * enemyCardValue;

      const [msg, type] = hasil > 0
        ? [`Hasil: ${hasil} (Positif) — MENANG! 🏆`, 'win']
        : hasil < 0
          ? [`Hasil: ${hasil} (Negatif) — KALAH! 💀`, 'lose']
          : [`Hasil: 0 — SERI! 🤝`, 'draw'];

      // Update counters
      if (type === 'win') winCount.textContent = ++wins;
      if (type === 'lose') loseCount.textContent = ++loses;
      if (type === 'draw') drawCount.textContent = ++draws;

      showResult(msg, type);
      addHistory(playerCardValue, enemyCardValue, symbol, hasil, type);
      setOpsEnabled(false);
    };

    // ========== EVENT LISTENERS — Tombol Operasi ==========
    opsBtns.forEach((btn) =>
      btn.addEventListener('click', () => {
        hitungHasil(btn.dataset.op);
      })
    );
  </script>

</body>
</html>
